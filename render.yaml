databases:
  - name: cab-db
    plan: free
    databaseName: cab_app
    user: cab_user

services:
  - type: web
    name: cab-app
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn cab:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cab-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
